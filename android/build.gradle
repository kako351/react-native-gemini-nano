import groovy.json.JsonSlurper

plugins {
  id("com.android.library")
  id("org.jetbrains.kotlin.android")
  id("com.facebook.react")
}

def getExtOrDefault(name, fallback) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : fallback
}

def getExtOrInt(name, fallback) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name).toInteger() : fallback
}

def getReactNativeVersion() {
  def packageJson = file("../node_modules/react-native/package.json")
  if (!packageJson.exists()) {
    throw new GradleException("react-native/package.json が見つかりません。npm install を確認してください。")
  }

  def parsed = new JsonSlurper().parseText(packageJson.text)
  return parsed.version
}

android {
  namespace "com.gemininano"
  compileSdkVersion getExtOrInt("compileSdkVersion", 35)

  defaultConfig {
    minSdkVersion getExtOrInt("minSdkVersion", 31)
    targetSdkVersion getExtOrInt("targetSdkVersion", 35)
    consumerProguardFiles "consumer-rules.pro"
  }

  buildFeatures {
    buildConfig true
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }

  sourceSets {
    main {
      java.srcDirs += [
        "${project.buildDir}/generated/source/codegen/java",
      ]
    }
  }

  lint {
    abortOnError false
  }
}

react {
  jsRootDir = file("../")
  libraryName = "GeminiNano"
  codegenJavaPackageName = "com.gemininano"
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation("com.facebook.react:react-android:${getReactNativeVersion()}")
  implementation("com.google.android.gms:play-services-tasks:18.3.0")
  implementation("com.google.mlkit:genai-prompt:1.0.0-alpha1")
  implementation("org.jetbrains.kotlinx:kotlinx-coroutines-core:1.8.1")

  testImplementation("junit:junit:4.13.2")
  testImplementation("org.jetbrains.kotlinx:kotlinx-coroutines-test:1.8.1")
}
